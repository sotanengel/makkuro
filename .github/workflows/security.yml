name: security

# Per spec SC-1.5 / SC-1.6 / SC-11: a daily run that fails the build if any
# direct or transitive runtime dep has a known CVE, plus a Bandit pass over
# our own source. Triage / patch must follow within the 72-hour SLA.

on:
  schedule:
    - cron: "17 6 * * *"  # 06:17 UTC daily, off the top of the hour
  workflow_dispatch:
  pull_request:
    paths:
      - "pyproject.toml"
      - ".github/workflows/security.yml"

permissions:
  contents: read

# Route pip installs through Takumi Guard so known-malicious PyPI releases are
# blocked before any dependency executes in CI. See SECURITY.md.
env:
  PIP_INDEX_URL: https://pypi.flatt.tech/simple/
  PIP_EXTRA_INDEX_URL: https://pypi.org/simple/

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install runtime deps (without the editable project)
        # We install the project's runtime deps as declared in pyproject.toml
        # but NOT makkuro itself. `pip install -e .` would install makkuro,
        # which pip-audit --strict then tries (and fails) to look up on PyPI
        # before the first release.
        run: |
          python -m pip install --upgrade pip
          python -c "
          import pathlib, tomllib
          data = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          print('\n'.join(data['project']['dependencies']))
          " > runtime-requirements.txt
          python -m pip install -r runtime-requirements.txt
          python -m pip install pip-audit==2.9.0
      - name: pip-audit
        run: python -m pip_audit --strict --progress-spinner off

  osv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Resolve runtime deps to requirements.txt
        # osv-scanner doesn't parse pyproject.toml. We resolve our runtime
        # deps (direct + transitive) into a requirements.txt shape and feed
        # that in via --lockfile.
        run: |
          python -m pip install --upgrade pip
          python -c "
          import pathlib, tomllib
          data = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          print('\n'.join(data['project']['dependencies']))
          " > /tmp/runtime-deps.txt
          python -m venv /tmp/resolveenv
          /tmp/resolveenv/bin/pip install --quiet -r /tmp/runtime-deps.txt
          /tmp/resolveenv/bin/pip freeze > requirements-osv.txt
          cat requirements-osv.txt
      - name: Install osv-scanner
        run: |
          curl -fsSL -o /tmp/osv "https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64"
          chmod +x /tmp/osv
      - name: Scan resolved requirements for known vulnerabilities
        run: /tmp/osv --lockfile=requirements.txt:./requirements-osv.txt

  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install bandit
        run: |
          python -m pip install --upgrade pip
          python -m pip install "bandit[toml]==1.8.0"
      - name: Run bandit
        run: python -m bandit -r src -ll
