name: security

# Per spec SC-1.5 / SC-1.6 / SC-11: a daily run that fails the build if any
# direct or transitive runtime dep has a known CVE, plus a Bandit pass over
# our own source. Triage / patch must follow within the 72-hour SLA.

on:
  schedule:
    - cron: "17 6 * * *"  # 06:17 UTC daily, off the top of the hour
  workflow_dispatch:
  pull_request:
    paths:
      - "pyproject.toml"
      - ".github/workflows/security.yml"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install runtime + audit tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pip-audit==2.9.0
      - name: pip-audit
        run: python -m pip_audit --strict --progress-spinner off

  osv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install osv-scanner
        run: |
          curl -fsSL -o /tmp/osv "https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64"
          chmod +x /tmp/osv
      - name: Scan repository for known vulnerabilities
        run: /tmp/osv -r .

  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install bandit
        run: |
          python -m pip install --upgrade pip
          python -m pip install "bandit[toml]==1.8.0"
      - name: Run bandit
        run: python -m bandit -r src -ll
