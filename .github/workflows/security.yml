name: security

# Per spec SC-1.5 / SC-1.6 / SC-11: a daily run that fails the build if any
# direct or transitive runtime dep has a known CVE, plus a Bandit pass over
# our own source. Triage / patch must follow within the 72-hour SLA.

on:
  schedule:
    - cron: "17 6 * * *"  # 06:17 UTC daily, off the top of the hour
  workflow_dispatch:
  pull_request:
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/security.yml"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.8.17"
          enable-cache: true
      - name: Export runtime deps to requirements.txt
        # We audit the project's runtime deps as declared in pyproject.toml
        # but NOT makkuro itself: pip-audit --strict would try (and fail) to
        # look up makkuro on PyPI before the first release. `uv export`
        # resolves against uv.lock and excludes the project itself.
        run: |
          uv export --frozen --no-hashes --no-dev --no-emit-project \
            -o runtime-requirements.txt
          cat runtime-requirements.txt
      - name: pip-audit
        run: |
          uvx --from "pip-audit==2.9.0" \
            pip-audit --strict --progress-spinner off \
            -r runtime-requirements.txt

  osv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.8.17"
          enable-cache: true
      - name: Export resolved runtime deps for osv-scanner
        # osv-scanner doesn't parse pyproject.toml or uv.lock directly. We
        # export uv.lock to a requirements.txt shape and feed that in via
        # --lockfile.
        run: |
          uv export --frozen --no-hashes --no-dev --no-emit-project \
            -o requirements-osv.txt
          cat requirements-osv.txt
      - name: Install osv-scanner
        run: |
          curl -fsSL -o /tmp/osv "https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64"
          chmod +x /tmp/osv
      - name: Scan resolved requirements for known vulnerabilities
        run: /tmp/osv --lockfile=requirements.txt:./requirements-osv.txt

  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.8.17"
          enable-cache: true
      - name: Run bandit
        run: uvx --from "bandit[toml]==1.8.0" bandit -r src -ll
