name: release

# Per spec SC-3 / SC-4 / SC-5: build, sign, attest, SBOM, publish.
#
# Trigger: pushing an annotated tag of the shape vMAJOR.MINOR.PATCH.
# The flow is:
#   1. build       -- builds sdist + wheels in an isolated runner.
#   2. sbom        -- emits a CycloneDX SBOM and attaches it to the release.
#   3. sign        -- Sigstore/cosign over every artifact, with attestations.
#   4. publish     -- uploads to PyPI via Trusted Publishing (PEP 740 / OIDC),
#                     gated on the `release` environment which requires a
#                     separate human approver (SC-3.3).
#   5. github      -- attaches the signed artifacts + SBOM to the GitHub
#                     Release, links to the transparency log.
#
# No long-lived PyPI tokens live in the repo. No self-hosted runners --
# GitHub-hosted `ubuntu-latest` gives us SLSA Build L3 eligibility.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+rc[0-9]+"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      version: ${{ steps.vars.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - id: vars
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0
        with:
          version: "0.8.17"
      - name: Build sdist + wheel (hermetic)
        env:
          SOURCE_DATE_EPOCH: "1700000000"
          PYTHONHASHSEED: "0"
        # `uv build` calls the declared PEP 517 backend (hatchling) in an
        # isolated build environment, matching the previous `python -m build`
        # behaviour but without a pip bootstrap.
        run: uv build
      - name: Generate SLSA build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "dist/*"
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7

  sbom:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0
        with:
          version: "0.8.17"
      - name: Generate CycloneDX SBOM
        # `uv sync --frozen` materialises the exact runtime closure from
        # uv.lock so cyclonedx-bom's "environment" scanner sees the same
        # versions the release was built against.
        run: |
          uv sync --frozen --no-dev
          uv run --with "cyclonedx-bom==5.3.0" \
            python -m cyclonedx_py environment --output-format JSON --output-file SBOM.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: SBOM.json
          retention-days: 7

  sign:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist
      - uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc # v3.3.0
        with:
          inputs: "dist/*"
          release-signing-artifacts: false
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-signed
          path: dist/
          retention-days: 7

  publish:
    runs-on: ubuntu-latest
    needs: [build, sbom, sign]
    # SC-3.3: the `release` environment is protected with a manual approval
    # gate. A reviewer that is NOT the tag pusher must approve before this
    # job runs.
    environment:
      name: release
      url: https://pypi.org/project/makkuro/${{ needs.build.outputs.version }}/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist-signed
          path: dist
      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No `password:` — we use OIDC Trusted Publishing (SC-3.1).
          attestations: true

  bump-formula:
    # Update the Homebrew Formula in-repo so `brew install` picks up the new
    # release. Only runs for stable tags (rc tags are skipped).
    runs-on: ubuntu-latest
    needs: [publish]
    if: ${{ !contains(github.ref_name, 'rc') }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0
        with:
          version: "0.8.17"
      - name: Compute source tarball sha256
        id: tarball
        run: |
          version="${GITHUB_REF_NAME#v}"
          url="https://github.com/${{ github.repository }}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          sha=$(curl -sL "$url" | sha256sum | awk '{print $1}')
          {
            echo "version=$version"
            echo "url=$url"
            echo "sha=$sha"
          } >> "$GITHUB_OUTPUT"
      - name: Rewrite top-level url / sha256
        env:
          URL: ${{ steps.tarball.outputs.url }}
          SHA: ${{ steps.tarball.outputs.sha }}
        run: |
          uv run --no-project --python 3.13 python - <<'PY'
          import os, pathlib, re
          f = pathlib.Path("Formula/makkuro.rb")
          t = f.read_text()
          t = re.sub(r'^  url "https://github\.com/[^"]+"$',
                     f'  url "{os.environ["URL"]}"', t, count=1, flags=re.M)
          t = re.sub(r'^  sha256 "[a-f0-9]{64}"$',
                     f'  sha256 "{os.environ["SHA"]}"', t, count=1, flags=re.M)
          f.write_text(t)
          PY
      - name: Refresh PyPI resources
        run: uv run --no-project --python 3.13 python scripts/update_formula.py
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/makkuro.rb
          if git diff --cached --quiet; then
            echo "formula already up to date"
          else
            git commit -m "chore(brew): bump formula to ${GITHUB_REF_NAME}"
            git push origin HEAD:main
          fi

  github-release:
    runs-on: ubuntu-latest
    needs: [publish, sbom]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist-signed
          path: dist
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: sbom
          path: sbom
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          files: |
            dist/*
            sbom/SBOM.json
          body: |
            Signed with Sigstore. Verify with:

            ```bash
            python -m pip install sigstore
            python -m sigstore verify identity \
              --cert-identity "https://github.com/${{ github.repository }}/.github/workflows/release.yml@${{ github.ref }}" \
              --cert-oidc-issuer "https://token.actions.githubusercontent.com" \
              dist/makkuro-*.whl
            ```

            CycloneDX SBOM: `SBOM.json`
