name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.8.17"
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Sync dev environment (locked)
        # --frozen refuses to update the lock; CI must match uv.lock exactly.
        # Takumi Guard routing is declared in [[tool.uv.index]] in
        # pyproject.toml, so no env vars are needed here.
        run: uv sync --frozen --group dev --python ${{ matrix.python-version }}
      - name: Lint
        run: uv run ruff check src tests bench
      - name: Test
        run: uv run pytest
      - name: Toy benchmark
        env:
          PYTHONPATH: src:.
        run: uv run python -m bench.run_eval bench/data/toy/samples.json

  formula:
    # Ensures Formula/makkuro.rb resources stay in sync with what the update
    # script would generate. Does NOT run `brew install` (expensive); the tap
    # consumers do that in their own CI.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.8.17"
      - name: Check Formula resources are fresh
        run: uv run --python 3.13 --no-project python scripts/update_formula.py --check
