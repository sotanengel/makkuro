name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Route pip installs through Takumi Guard so known-malicious PyPI releases are
# blocked before any dependency executes in CI. See SECURITY.md.
env:
  PIP_INDEX_URL: https://pypi.flatt.tech/simple/
  PIP_EXTRA_INDEX_URL: https://pypi.org/simple/

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check src tests bench
      - name: Test
        run: python -m pytest
      - name: Toy benchmark
        run: |
          PYTHONPATH=src:. python -m bench.run_eval bench/data/toy/samples.json

  formula:
    # Ensures Formula/makkuro.rb resources stay in sync with what the update
    # script would generate. Does NOT run `brew install` (expensive); the tap
    # consumers do that in their own CI.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Check Formula resources are fresh
        run: python scripts/update_formula.py --check
