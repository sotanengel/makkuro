name: 機能提案
description: 新機能・新検出器・新プロバイダなどの提案
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題
      description: "どのユースケースで困るのかをユーザ目線で。"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 提案内容
      description: |
        API / 設定キー / CLI コマンドなど、可能なら具体形で。
        既存の `redaction.custom_patterns` / `allow_list` で代替できる場合は
        その旨も触れてください。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案
    validations:
      required: false
  - type: dropdown
    id: phase
    attributes:
      label: 該当しそうな領域
      options:
        - 検出器 (detectors)
        - プロトコル (protocol adapter)
        - vault / audit
        - proxy / streaming
        - CLI / 設定
        - リリース / パッケージング
        - その他
